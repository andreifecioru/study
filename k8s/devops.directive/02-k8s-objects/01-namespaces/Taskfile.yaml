version: "3"

tasks:
  01-create-namespace:
    desc: Create K8S namespace
    cmds:
      - kubectl create namespace app-group-001

  02-apply-namespace-config:
    desc: Apply configuration to namespace resource
    cmds:
      - kubectl apply -f ./namespace.yaml

  03-delete-namespace:
    desc: Delete K8S namespace resource
    cmds:
      - kubectl delete -f ./namespace.yaml
      # - kubectl delete namespace app-group-001
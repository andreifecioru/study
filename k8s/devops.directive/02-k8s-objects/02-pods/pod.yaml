apiVersion: v1
kind: Pod
metadata:
  name: nginx
  namespace: app-group-002
spec:
  containers:
    - name: nginx
      image: cgr.dev/chainguard/nginx:latest
      ports:
        - containerPort: 8080
          protocol: TCP
      readinessProbe:
        httpGet:
          path: /
          port: 8080
      resources:
        limits:
          memory: "50Mi"
          cpu: "500m"
        requests:
          memory: "25Mi"
          cpu: "250m"
      securityContext:
        allowPrivilegeEscalation: false
        privileged: false

  securityContext:
    seccompProfile:
      type: RuntimeDefault
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
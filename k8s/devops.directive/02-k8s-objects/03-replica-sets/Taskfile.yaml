version: 3

env:
  NAMESPACE: app-group-003

tasks:
  01-create-namespace:
    desc: Create the K8S namespace
    cmds:
      - kubectl apply -f ./namespace.yaml
      - kubens ${NAMESPACE}

  02-create-nginx-replica-set:
    desc: Create the replica set for nginx service
    cmds:
      - kubectl apply -f ./replica-set.yaml

  03-delete-pods:
    desc: "Delete all the pods (they will be automatically recreated)"
    cmds:
      - kubectl delete pods --all
      - kubectl get pods --watch

  05-cleanup:
    desc: Cleanup all resources
    cmds:
      - kubectl delete -f ./namespace.yaml